<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Ticket Vision | Check Inn Saltillo</title>
  <link rel="stylesheet" href="styles.css?v=26">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="thinking-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <h3 id="loadingTitle">Claude está analizando...</h3>
      <p id="loadingSubtitle">Extrayendo productos y datos del ticket</p>
    </div>
  </div>

  <div class="page-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">TV</div>
        <div class="logo-text">
          <h1>Ticket Vision</h1>
          <span>Check Inn Saltillo · Powered by Claude AI</span>
        </div>
      </div>
      <div class="header-badge">v8</div>
    </header>

    <!-- Steps Bar -->
    <nav class="steps-bar">
      <div class="step active" id="step-ind-1">
        <div class="step-circle">1</div>
        <span>Captura</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step-ind-2">
        <div class="step-circle">2</div>
        <span>Resultados</span>
      </div>
    </nav>

    <!-- ── PASO 1: Captura ─────────────────────────────────────── -->
    <div class="container" id="stepCaptura">
      <div class="section">
        <div class="section-header">
          <div class="section-num">1</div>
          <div>
            <p class="section-title">Captura de tickets</p>
            <p class="section-subtitle">Cada imagen corresponde a un ticket independiente</p>
          </div>
        </div>

        <div class="upload-box-single">
          <button class="btn-agregar-ticket" onclick="openUploadSheet()">
            <span class="btn-agregar-icon">📎</span>
            <span>Agregar tickets</span>
          </button>
          <p class="upload-hint">Toca para seleccionar desde cámara, fotos o archivos</p>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" id="files-camera"  accept="image/*" capture="environment" multiple style="display:none">
        <input type="file" id="files-gallery" accept="image/*,video/*" multiple style="display:none">
        <input type="file" id="files-files"   accept="image/*,application/pdf" multiple style="display:none">

        <div id="imagePreview" class="image-strip hidden"></div>

        <div id="analyzeWrap" class="hidden">
          <button class="btn-analizar" onclick="analyzeTickets()">🔍 Analizar tickets</button>
        </div>
        <div id="analyzeStatus" class="status-inline"></div>
      </div>
    </div>

    <!-- ── PASO 2: Resultados (un card por ticket) ─────────────── -->
    <div id="ticketsContainer" class="tickets-container"></div>

  </div><!-- /page-shell -->

  <!-- Upload action sheet -->
  <div id="uploadSheetOverlay" class="sheet-overlay hidden" onclick="closeUploadSheet()"></div>
  <div id="uploadSheet" class="upload-sheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <p class="sheet-title">Agregar tickets</p>
    <label class="sheet-option" onclick="closeUploadSheet()">
      <input type="file" id="sheet-camera" accept="image/*" capture="environment" multiple style="display:none">
      <span class="sheet-option-icon">📷</span>
      <span class="sheet-option-label">Cámara</span>
    </label>
    <label class="sheet-option" onclick="closeUploadSheet()">
      <input type="file" id="sheet-files" accept="image/*,application/pdf" multiple style="display:none">
      <span class="sheet-option-icon">📁</span>
      <span class="sheet-option-label">Archivos</span>
    </label>
    <label class="sheet-option" onclick="closeUploadSheet()">
      <input type="file" id="sheet-gallery" accept="image/*,video/*" multiple style="display:none">
      <span class="sheet-option-icon">🖼</span>
      <span class="sheet-option-label">Fotos y videos</span>
    </label>
    <button class="sheet-cancel" onclick="closeUploadSheet()">Cancelar</button>
  </div>

  <!-- Botón global fijo en la parte inferior -->
  <div id="btnGuardarResultados" class="guardar-resultados-bar hidden">
    <button class="btn-guardar-resultados" onclick="guardarResultados()">💾 Guardar resultados</button>
  </div>

  <script src="app.js?v=26"></script>
</body>
</html>
