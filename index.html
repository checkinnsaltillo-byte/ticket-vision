<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Ticket Vision | Check Inn Saltillo</title>
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="thinking-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <h3 id="loadingTitle">Claude está analizando...</h3>
      <p id="loadingSubtitle">Extrayendo productos y datos del ticket</p>
    </div>
  </div>

  <div class="page-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">TV</div>
        <div class="logo-text">
          <h1>Ticket Vision</h1>
          <span>Check Inn Saltillo · Powered by Claude AI</span>
        </div>
      </div>
      <div class="header-badge">v8</div>
    </header>

    <!-- Steps Bar -->
    <nav class="steps-bar">
      <div class="step active" id="step-ind-1">
        <div class="step-circle">1</div>
        <span>Captura</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step-ind-2">
        <div class="step-circle">2</div>
        <span>Resultados</span>
      </div>
    </nav>

    <!-- ── PASO 1: Captura ─────────────────────────────────────── -->
    <div class="container" id="stepCaptura">
      <div class="section">
        <div class="section-header">
          <div class="section-num">1</div>
          <div>
            <p class="section-title">Captura de tickets</p>
            <p class="section-subtitle">Cada imagen corresponde a un ticket independiente</p>
          </div>
        </div>

        <div class="upload-box">
          <label class="upload-drop custom-upload">
            <input type="file" id="files-camera" accept="image/*" capture="environment" multiple>
            <div class="upload-copy">
              <span class="upload-title">📷 Tomar foto</span>
              <span class="upload-subtitle">Abre la cámara de tu dispositivo</span>
            </div>
            <span class="upload-cta cta-camera">Abrir cámara</span>
          </label>
          <label class="upload-drop custom-upload">
            <input type="file" id="files-gallery" accept="image/*" multiple>
            <div class="upload-copy">
              <span class="upload-title">🖼 Subir desde galería</span>
              <span class="upload-subtitle">Elige una o varias imágenes</span>
            </div>
            <span class="upload-cta cta-gallery">Seleccionar</span>
          </label>
        </div>

        <div id="imagePreview" class="image-strip hidden"></div>

        <div id="analyzeWrap" class="hidden">
          <button class="btn-analizar" onclick="analyzeTickets()">🔍 Analizar tickets</button>
        </div>
        <div id="analyzeStatus" class="status-inline"></div>
      </div>
    </div>

    <!-- ── PASO 2: Resultados (un card por ticket) ─────────────── -->
    <div id="ticketsContainer" class="tickets-container"></div>

  </div><!-- /page-shell -->

  <script src="app.js?v=19"></script>
</body>
</html>
