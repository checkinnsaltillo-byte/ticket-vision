steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ticket-vision
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/ticket-vision

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ticket-vision
      - --image=gcr.io/$PROJECT_ID/ticket-vision
      - --region=northamerica-south1
      - --platform=managed
      - --quiet

images:
  - gcr.io/$PROJECT_ID/ticket-vision
